[build]
builder = "DOCKERFILE"
dockerfilePath = "src/Api/Dockerfile"
watchPatterns = [
  "src/**",
  "Directory.Build.props",
  "Directory.Packages.props",
  "global.json",
  "railway.toml",
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
