name: Client 💻

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/client.yml"
      - "apps/client/**"
      - "package.json"
      - "packages/config/**"
      - "packages/core/**"
      - "packages/ui/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - ".github/workflows/client.yml"
      - "apps/client/**"
      - "package.json"
      - "packages/config/**"
      - "packages/core/**"
      - "packages/ui/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

jobs:
  basic:
    name: "🛠️ Build, Lint/Format"
    runs-on: ubuntu-latest

    steps:
      - name: "🏖️ Checkout Repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "🔧 Install pnpm"
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        id: pnpm-install

      - name: "🔧 Use Node.js"
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: "pnpm"

      - name: "📦 Install dependencies"
        run: pnpm ci
      # Enable at later time
      # - name: Run the tests and generate coverage report
      #   run: npm test -- --coverage

      - name: "🧱 Build"
        run: pnpm build:client

      - name: "🧪 Typecheck"
        run: pnpm --filter kijk-client --filter @kijk/config --filter @kijk/core --filter @kijk/ui typecheck

      - name: "🧹 Format"
        run: pnpm --filter kijk-client --filter @kijk/config --filter @kijk/core --filter @kijk/ui fmt

      - name: "🔍 Lint"
        run: pnpm --filter kijk-client --filter @kijk/config --filter @kijk/core --filter @kijk/ui lint

      - name: "🔍 Audit"
        run: pnpm audit
        continue-on-error: true
