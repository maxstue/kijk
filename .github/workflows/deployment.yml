name: Deployment

on:
  workflow_dispatch:
  push:
    branches: ["main"]
permissions:
  contents: read

env:
  DOTNET_VERSION: "10.x.x"

jobs:
  detect-changes:
    name: "🔎 Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.api-changes.outputs.any_changed }}
      infra: ${{ steps.infra-changes.outputs.any_changed }}
      client: ${{ steps.client-changes.outputs.any_changed }}
    steps:
      - name: "🏖️ Checkout Repository"
        uses: actions/checkout@v6

      - name: "Detect API changes"
        id: api-changes
        uses: tj-actions/changed-files@v47
        with:
          files: |
            apps/api/**
            global.json

      - name: "Detect Infrastructure changes"
        id: infra-changes
        uses: tj-actions/changed-files@v47
        with:
          files: |
            apps/api/src/Infrastructure/Migrations/**

      - name: "Detect Client changes"
        id: client-changes
        uses: tj-actions/changed-files@v47
        with:
          files: |
            apps/client/**
            package.json
            packages/config/**
            packages/core/**
            packages/ui/**
            pnpm-lock.yaml
            pnpm-workspace.yaml

  database-create-migration:
    name: "Migrate Database 🏗️"
    needs: [detect-changes]
    if: needs.detect-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/api
    steps:
      - name: "🏖️ Checkout Repository"
        uses: actions/checkout@v6

      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: "📦 Install dotnet-ef"
        run: |
          dotnet tool install --global dotnet-ef

      - name: "🛠️ Create migrations bundle"
        run: |
          dotnet tool restore &&
          dotnet ef migrations bundle --startup-project ./src/Api/ --project ./src/Infrastructure/ --context AppDbContext --self-contained

      - name: "run ls"
        run: |
          ls -al

      - name: "⬆️ Upload EF Migrations Bundle Artifact"
        uses: actions/upload-artifact@v6
        with:
          name: efbundle
          path: ./apps/api/efbundle
          retention-days: 5
          if-no-files-found: error

  database-apply-migration:
    name: Apply Database Migration 🗃️
    needs: [database-create-migration, detect-changes]
    if: needs.detect-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    environment:
      name: production-db
    defaults:
      run:
        working-directory: ./apps/api
    steps:
      - name: "🏖️ Checkout Repository"
        uses: actions/checkout@v6

      - name: "⬇️ Download EF Migrations Bundle Artifact"
        uses: actions/download-artifact@v7
        with:
          name: efbundle
          path: ./apps/api

      - name: "Make bundle executable"
        run: chmod +x ./efbundle

      - name: "🍎 Apply migrations bundle"
        run: ./efbundle --connection "${{ secrets.API_MIGRATION_CONNECTION }}"

  production-gate:
    name: Production Gate ✅
    needs: [database-create-migration, database-apply-migration, detect-changes]
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: "🏖️ Checkout Repository"
        uses: actions/checkout@v6

      - name: "✅ CI and migrations passed"
        if: needs.detect-changes.outputs.infra != 'true' || (needs.database-create-migration.result == 'success' && needs.database-apply-migration.result == 'success')
        run: |
          echo "Railway can deploy after this workflow passes."

      - name: "❌ Migration gate failed"
        if: needs.detect-changes.outputs.infra == 'true' && (needs.database-create-migration.result != 'success' || needs.database-apply-migration.result != 'success')
        run: |
          echo "Migration gate failed; Railway must not deploy this commit."
          exit 1
